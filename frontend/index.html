<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>UZ Tickets</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
</head>
<body>
  <header class="header">
    <div class="nav-bar"><div class="abstract-graphic">🚆</div></div>
    <h1 class="header-title">Укрзалізниця квитки</h1>
    <div class="header-sub">Моніторинг квитків УЗ</div>
    <svg class="header-wave" viewBox="0 0 1440 22" preserveAspectRatio="none">
      <path d="M0,22 L1440,22 L1440,7 C1080,24 360,24 0,7 Z"></path>
    </svg>
  </header>

  <main id="app">
    <!-- Список маршрутів -->
    <section id="view-list">
      <button class="primary" id="btn-add">➕ Додати маршрут</button>
      <h2 class="section-title">Мої маршрути</h2>
      <div id="routes"></div>
    </section>

    <!-- Майстер додавання -->
    <section id="view-add" hidden>
      <div class="step" id="step-from">
        <label>Станція відправлення</label>
        <input id="from-q" placeholder="Напр.: Київ, Львів, Варшава" autocomplete="off" />
        <div class="results" id="from-results"></div>
      </div>

      <div class="step" id="step-to" hidden>
        <div class="picked" id="picked-from"></div>
        <label>Станція призначення</label>
        <input id="to-q" placeholder="Напр.: Львів, Краків" autocomplete="off" />
        <div class="results" id="to-results"></div>
      </div>

      <div class="step" id="step-date" hidden>
        <div class="picked" id="picked-to"></div>
        <label>Дата</label>
        <input id="date" type="date" />
        <label>Тип вагона (необов'язково)</label>
        <div class="chips" id="wagons">
          <span class="chip" data-code="П">Плацкарт</span>
          <span class="chip" data-code="К">Купе</span>
          <span class="chip" data-code="Л">Люкс/СВ</span>
          <span class="chip" data-code="С">Сидячий</span>
          <span class="chip" data-code="О">Загальний</span>
        </div>
        <button class="primary" id="btn-save">✅ Зберегти маршрут</button>
      </div>

      <button class="ghost" id="btn-cancel">Скасувати</button>
    </section>

    <!-- Статус -->
    <section id="view-status" hidden>
      <div id="status-head"></div>
      <div id="status-body"></div>
      <button class="ghost" id="btn-back">🔙 Назад</button>
    </section>

    <!-- Налаштування маршруту -->
    <section id="view-settings" hidden>
      <div id="set-head"></div>

      <label>Тип вагона <span class="hint">(порожньо = всі)</span></label>
      <div class="chips" id="set-wagons">
        <span class="chip" data-code="П">Плацкарт</span>
        <span class="chip" data-code="К">Купе</span>
        <span class="chip" data-code="Л">Люкс</span>
        <span class="chip" data-code="С1">1 клас</span>
        <span class="chip" data-code="С2">2 клас</span>
        <span class="chip" data-code="С">Сидячий</span>
        <span class="chip" data-code="О">Загальний</span>
      </div>

      <label>Конкретні поїзди <span class="hint">(порожньо = всі)</span></label>
      <div class="chips" id="set-trains-chips"></div>
      <button class="ghost" id="set-load-trains">📋 Завантажити список поїздів</button>

      <label>Тихі години <span class="hint">(вночі без звуку)</span></label>
      <div class="row2">
        <input id="set-qfrom" type="time" />
        <input id="set-qto" type="time" />
      </div>

      <label>Коли пінгувати <span class="hint">(скоро)</span></label>
      <select id="set-notify" disabled>
        <option>З'явилися місця + зміни</option>
      </select>

      <button class="primary" id="set-save">💾 Зберегти</button>
      <button class="ghost" id="set-back">🔙 Назад</button>
    </section>
  </main>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
